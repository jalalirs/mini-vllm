# Mini-vLLM Deployment - Tensor Parallel 4
# Deploy: kubectl apply -f mini-vllm-tp4.yaml -n hyperpod-ns-inference
# Delete: kubectl delete -f mini-vllm-tp4.yaml -n hyperpod-ns-inference

apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${MINI_VLLM_PREFIX}gptoss-tp4
  namespace: ${MINI_VLLM_NAMESPACE}
  labels:
    app: ${MINI_VLLM_PREFIX}gptoss-tp4
    kueue.x-k8s.io/queue-name: "${MINI_VLLM_KUEUE_QUEUE}"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ${MINI_VLLM_PREFIX}gptoss-tp4
  template:
    metadata:
      labels:
        app: ${MINI_VLLM_PREFIX}gptoss-tp4
        kueue.x-k8s.io/queue-name: "${MINI_VLLM_KUEUE_QUEUE}"
    spec:
      nodeSelector:
        node.kubernetes.io/instance-type: ${MINI_VLLM_NODE_TYPE}
      containers:
      - name: mini-vllm
        image: ${MINI_VLLM_REGISTRY}/${MINI_VLLM_PREFIX}server:latest
        imagePullPolicy: Always
        args:
        - --model
        - ${MINI_VLLM_MODEL_PATH}
        - --tensor-parallel-size
        - "4"
        - --host
        - "0.0.0.0"
        - --port
        - "8000"
        - --dtype
        - "bfloat16"
        ports:
        - containerPort: 8000
          name: http
        env:
        # Distributed settings for single-pod multi-GPU
        - name: MASTER_ADDR
          value: "127.0.0.1"
        - name: MASTER_PORT
          value: "29500"
        - name: WORLD_SIZE
          value: "4"
        - name: RANK
          value: "0"
        - name: LOCAL_RANK
          value: "0"
        - name: CUDA_VISIBLE_DEVICES
          value: "0,1,2,3"
        - name: NCCL_DEBUG
          value: "WARN"
        - name: NCCL_IB_DISABLE
          value: "0"
        - name: NCCL_NET_GDR_LEVEL
          value: "2"
        - name: PYTORCH_CUDA_ALLOC_CONF
          value: "expandable_segments:True"
        volumeMounts:
        - name: fsx-models
          mountPath: /mnt/fsx
        - name: shm
          mountPath: /dev/shm
        resources:
          requests:
            nvidia.com/gpu: 4
            memory: "128Gi"
            cpu: "16"
          limits:
            nvidia.com/gpu: 4
            memory: "256Gi"
            cpu: "32"
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 300
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 30
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 600
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 10
      volumes:
      - name: fsx-models
        persistentVolumeClaim:
          claimName: ${MINI_VLLM_FSX_PVC}
      - name: shm
        emptyDir:
          medium: Memory
          sizeLimit: 32Gi

---
apiVersion: v1
kind: Service
metadata:
  name: ${MINI_VLLM_PREFIX}gptoss-tp4
  namespace: ${MINI_VLLM_NAMESPACE}
spec:
  selector:
    app: ${MINI_VLLM_PREFIX}gptoss-tp4
  ports:
  - name: http
    port: 8000
    targetPort: 8000
  type: ClusterIP

